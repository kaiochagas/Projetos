<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Próximos Finais de Semana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      }
      .page-container {
        max-width: 920px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }
      .card-app {
        border: none;
        border-radius: 20px;
        box-shadow: 0 16px 45px rgba(46, 61, 73, 0.12);
      }
      .card-body {
        padding: 32px;
      }
      .page-title {
        font-size: clamp(1.8rem, 2.2vw, 2.4rem);
      }
      .table-responsive {
        margin-top: 24px;
      }
      .table th,
      .table td {
        vertical-align: middle;
      }
      .status-com {
        color: #1b5e20;
        font-weight: 600;
      }
      .status-sem {
        color: #b71c1c;
        font-weight: 600;
      }
      @media (max-width: 575px) {
        .card-body {
          padding: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-container">
      <div class="card card-app">
        <div class="card-body">
          <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-3">
            <div>
              <h1 class="page-title">Próximos Finais de Semana</h1>
              <p class="text-muted mb-0">A lista começa a partir do sábado de referência selecionado.</p>
            </div>
            <a href="/" class="btn btn-secondary align-self-center">Voltar</a>
          </div>

          <div class="table-responsive">
            <table class="table table-hover table-bordered align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th class="text-center">Semana</th>
                  <th>Início</th>
                  <th>Fim</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                {% for it in items %}
                <tr>
                  <td class="text-center">{{ loop.index }}</td>
                  <td>{{ it.inicio }}</td>
                  <td>{{ it.fim }}</td>
                  <td class="{{ 'status-com' if it.status.startswith('✅') else 'status-sem' }}">{{ it.status }}</td>
                </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
