<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Próximos Finais de Semana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container py-4">
      <h1 class="mb-3">PRÓXIMOS FINAIS DE SEMANA</h1>

      <table class="table table-striped">
        <thead>
          <tr>
            <th>INÍCIO</th>
            <th>FIM</th>
            <th>STATUS</th>
          </tr>
        </thead>
        <tbody>
          {% for it in items %}
          <tr>
            <td>{{ it.inicio }}</td>
            <td>{{ it.fim }}</td>
            <td>{{ it.status }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

      <a href="/" class="btn btn-secondary">Voltar</a>
    </div>
  </body>
</html>
