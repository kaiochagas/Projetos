<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👧 Controle de Guarda das Filhas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>👧 CONTROLE DE GUARDA DAS FILHAS</h1>
            <div class="theme-toggle">
                <button id="btnTemaClaro" class="btn-tema ativo">☀ Claro</button>
                <button id="btnTemaEscuro" class="btn-tema">🌙 Escuro</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Seção de Entrada -->
            <section class="entrada-section">
                <div class="form-group">
                    <label for="dataReferencia">📅 Data em que você estava com suas filhas</label>
                    <input type="date" id="dataReferencia" required>
                </div>

                <div class="form-group">
                    <label for="dataEvento">📅 Data do evento</label>
                    <input type="date" id="dataEvento" required>
                </div>

                <!-- Botões Principais -->
                <div class="buttons-container">
                    <button id="btnDashboard" class="btn btn-primary">📊 Dashboard</button>
                    <button id="btnPesquisar" class="btn btn-primary">🔍 Pesquisar Data</button>
                    <button id="btnCalendario" class="btn btn-primary">📆 Calendário Visual</button>
                </div>

                <!-- Botões Secundários -->
                <div class="buttons-container">
                    <button id="btnPeriodos" class="btn btn-secondary">📋 Períodos</button>
                    <button id="btnPDF" class="btn btn-secondary">📄 Exportar PDF</button>
                    <button id="btnExcel" class="btn btn-secondary">📊 Exportar Excel</button>
                    <button id="btnWhatsApp" class="btn btn-secondary">💬 Copiar WhatsApp</button>
                    <button id="btnHistorico" class="btn btn-secondary">📋 Histórico</button>
                </div>
            </section>

            <!-- Resultado -->
            <div id="resultado" class="resultado"></div>
        </main>
    </div>

    <!-- Modal Dashboard -->
    <div id="modalDashboard" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="dashboardContent"></div>
        </div>
    </div>

    <!-- Modal Calendário -->
    <div id="modalCalendario" class="modal">
        <div class="modal-content modal-large">
            <span class="close">&times;</span>
            <div id="calendarioContent"></div>
        </div>
    </div>

    <!-- Modal Períodos -->
    <div id="modalPeriodos" class="modal">
        <div class="modal-content modal-large">
            <span class="close">&times;</span>
            <div id="periodosContent"></div>
        </div>
    </div>

    <!-- Modal Pesquisa -->
    <div id="modalPesquisa" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="pesquisaContent"></div>
        </div>
    </div>

    <!-- Modal Histórico -->
    <div id="modalHistorico" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="historicoContent"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
